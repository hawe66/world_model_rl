  tailwind.config = {

      },
      node: {
        component: '#a855f7', composable: '#7c3aed', utility: '#6d28d9',
        external: '#525252', event: '#d8b4fe', data: '#9333ea',
      },
    }}},
  };

<style>
  html, body { background: #000000; margin: 0; }
  .mermaid-wrap svg { max-width: none !important; height: auto !important; }
  .mermaid-wrap .node { cursor: pointer; }
  .mermaid-wrap .node:hover rect,
  .mermaid-wrap .node:hover polygon,
  .mermaid-wrap .node:hover circle,
  .mermaid-wrap .node:hover .label-container { filter: brightness(1.3); transition: filter .15s; }
  .dt-body p { color:#a0a0a0; font-size:.88rem; line-height:1.65; margin-bottom:10px; }
  .dt-body p code {
    background:rgba(168,85,247,.12); padding:1px 6px; border-radius:4px;

    background: #000000; border: 1px solid #2a2a2a; border-radius: 8px;

  .dt-body .shiki { background: #000000 !important; }
  .dt-body .shiki code, .dt-body pre.code-fallback code {
    font-family: 'SF Mono','Fira Code',monospace; font-size: .78rem; line-height: 1.55;

<body class="bg-wt-bg">
<div id="root"></div>
<script type="module">
import { createHighlighter } from 'https://cdn.jsdelivr.net/npm/shiki@3.22.0/+esm';

const { useState, useEffect, useRef, useCallback } = React;
const h = React.createElement;

const SUMMARY = "world-model-zoo reimplements the model-based RL world-model lineage (PlaNet → Dreamer v1/v2/v3 → TD-MPC2 → IRIS/STORM/DIAMOND) from papers only, in PyTorch. The shared wm/common layer is built today: environment wrappers emit one uniform Transition, a random collector dumps episodes to npz, a sequence replay buffer serves (B, L) chunks, and device/checkpoint/logger/eval/viz utilities back the training loop. The algorithms (Task 4+) plug into this foundation.";

const DIAGRAM = `graph TD
  subgraph envs["Environments"]
    envWrappers["Env Wrappers"]
    transition["Transition"]
  end
  subgraph collection["Data Collection"]
    collectRandom["Random Collection"]
    replayBuffer["Replay Buffer"]
  end
  subgraph infra["Training Infrastructure"]
    device["Device Select"]
    checkpoint["Checkpoint / Resume"]
    logger["Logger"]
    evaluate["Evaluation"]
    viz["Visualization"]
  end
  subgraph algorithms["Algorithms (Task 4+)"]
    algos["World-Model Algos"]
  end

  classDef component fill:#a855f7,stroke:#c084fc,color:#fff
  classDef utility fill:#6d28d9,stroke:#8b5cf6,color:#fff
  classDef event fill:#d8b4fe,stroke:#e9d5ff,color:#000
  classDef data fill:#9333ea,stroke:#a855f7,color:#fff

  collectRandom -->|"rolls policy in"| envWrappers
  envWrappers -->|"step() yields"| transition
  transition -->|"stored by"| replayBuffer
  collectRandom -->|"writes npz to"| replayBuffer
  replayBuffer -->|"(B,L) batches"| algos
  algos -->|"selects"| device
  algos -->|"checkpoints to"| checkpoint
  algos -->|"logs to"| logger
  algos -->|"evaluated by"| evaluate
  algos -->|"open-loop via"| viz
  checkpoint -.->|"persists"| replayBuffer
  evaluate -->|"separate env"| envWrappers

  class envWrappers data
  class transition event
  class collectRandom utility
  class replayBuffer data
  class device utility
  class checkpoint utility
  class logger utility
  class evaluate utility
  class viz utility
  class algos component

  click envWrappers nodeClickHandler "View details"
  click transition nodeClickHandler "View details"
  click collectRandom nodeClickHandler "View details"
  click replayBuffer nodeClickHandler "View details"
  click device nodeClickHandler "View details"
  click checkpoint nodeClickHandler "View details"
  click logger nodeClickHandler "View details"
  click evaluate nodeClickHandler "View details"
  click viz nodeClickHandler "View details"
  click algos nodeClickHandler "View details"
`;

const NODES = {
  envWrappers: {
    title: "Env Wrappers (Atari / DMC)",
    description: "Wrap gymnasium ALE and dm_control into one interface: 64x64 obs, action-repeat, sticky-actions-off, frame max-pool. They exist so every algorithm trains against identical observation/action semantics.",
    files: ["wm/common/envs/atari.py", "wm/common/envs/dmc.py"],
    code: `self._env = gym.make(env_id, frameskip=1, repeat_action_probability=0.0)`,
    lang: "python",
  },
  transition: {
    title: "Transition (common interface)",
    description: "The single struct every wrapper returns from reset() and step(). The is_last vs is_terminal split is the cornerstone: time-limit truncation is is_last but NOT is_terminal, so the critic still bootstraps.",
    files: ["wm/common/envs/base.py"],
    code: `@dataclass
class Transition:
    obs: dict[str, np.ndarray]
    is_first: bool
    is_last: bool      # episode ended
    is_terminal: bool  # true terminal (not time-limit)`,
    lang: "python",
  },
  collectRandom: {
    title: "Random Collection",
    description: "Rolls a random policy through a wrapper and dumps episodes to a compressed npz (uint8 images). It bootstraps buffer and model development before any agent is trained.",
    files: ["scripts/collect_random.py"],
    code: `out = {k: np.stack(v) for k, v in buffers.items()}
np.savez_compressed(args.out, **out)`,
    lang: "python",
  },
  replayBuffer: {
    title: "Sequence Replay Buffer",
    description: "Fixed-capacity ring that samples length-L windows from the transition stream; windows may cross episode boundaries with is_first marking resets (DreamerV2/V3 style). World models train on (B, L) sequences, not single steps.",
    files: ["wm/common/buffer.py"],
    code: `starts = self._rng.integers(0, self._size - seq_len + 1, size=batch_size)
return self.gather(starts, seq_len, to_float=to_float)`,
    lang: "python",
  },
  device: {
    title: "Device Select",
    description: "The single source of truth for accelerator choice (cuda > xpu > mps > cpu). Hardcoding devices is banned, so the same code runs on the cloud GPU and falls back to CPU locally.",
    files: ["wm/common/device.py"],
    code: `if torch.cuda.is_available():
    return torch.device("cuda")
# then xpu > mps > cpu`,
    lang: "python",
  },
  checkpoint: {
    title: "Checkpoint / Resume",
    description: "Atomically saves and restores model, optimizer, env step, RNG, and replay buffer for --resume. Cloud sessions get killed mid-run, so every long job must resume exactly where it stopped.",
    files: ["wm/common/checkpoint.py"],
    code: `torch.save(payload, tmp_path)
os.replace(tmp_path, path)  # atomic swap`,
    lang: "python",
  },
  logger: {
    title: "Logger",
    description: "Mirrors every scalar to both metrics.jsonl and TensorBoard, keyed on env step. The env-step axis keeps learning curves comparable across algorithms.",
    files: ["wm/common/logger.py"],
    code: `self._jsonl.write(json.dumps({"step": int(step), key: value}) + "\\n")
self._writer.add_scalar(key, value, step)`,
    lang: "python",
  },
  evaluate: {
    title: "Evaluation",
    description: "Rolls a policy in a SEPARATE eval env for N episodes and returns mean/std return. A fixed protocol keeps evaluation off the training env's RNG and consistent across algorithms.",
    files: ["wm/common/eval.py"],
    code: `action = policy(t.obs, mode)
t = env.step(action)
ep_return += float(t.reward)`,
    lang: "python",
  },
  viz: {
    title: "Visualization",
    description: "Renders rollout filmstrips/GIFs and open-loop real-vs-predicted grids. World-model debugging starts by eyeballing prediction quality before ever touching the policy.",
    files: ["wm/common/viz.py"],
    code: `canvas = np.concatenate([real_grid, pred_grid], axis=0)  # real over pred`,
    lang: "python",
  },
  algos: {
    title: "World-Model Algorithms (Task 4+)",
    description: "The lineage implementations that consume (B, L) batches, reset state on is_first, and feed decoder output into viz. This is where reproduction happens — currently a placeholder directory.",
    files: ["wm/algos/"],
    code: `# wm/algos/<name>/  -> rssm, dreamer_v1..v3, tdmpc2, iris, storm, diamond`,
    lang: "python",
  },
};

const LEGEND = [
  { label: 'Algorithms', color: 'bg-node-component' },
  { label: 'Infra util', color: 'bg-node-utility' },
  { label: 'Data', color: 'bg-node-data' },
  { label: 'Transition', color: 'bg-node-event' },
];

const langs = [...new Set(Object.values(NODES).map(n => n.lang).filter(Boolean))];
if (langs.length === 0) langs.push('typescript');
let highlighter = null;
try { highlighter = await createHighlighter({ themes: ['vitesse-dark'], langs }); }
catch (e) { console.warn('Shiki failed:', e); }
const HIGHLIGHTED = {};
for (const [id, node] of Object.entries(NODES)) {
  if (node.code && highlighter) {
    try { HIGHLIGHTED[id] = highlighter.codeToHtml(node.code, { lang: node.lang || 'typescript', theme: 'vitesse-dark' }); }
    catch (e) { console.warn('Highlight failed for ' + id, e); }
  }
}

const MERMAID_THEME = {
  primaryColor: '#0a0a0a', primaryTextColor: '#ffffff', primaryBorderColor: '#2a2a2a',
  lineColor: '#a0a0a0', background: '#000000',
};

function usePanZoom() {
  const viewportRef = useRef(null), canvasRef = useRef(null), zoomDisplayRef = useRef(null);
  const st = useRef({ zoom: 1, panX: 0, panY: 0 });
  const drag = useRef({ on: false, lx: 0, ly: 0 });

  const apply = useCallback(() => {
    const { zoom, panX, panY } = st.current;
    if (canvasRef.current)
      canvasRef.current.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
    if (zoomDisplayRef.current)
      zoomDisplayRef.current.textContent = Math.round(zoom * 100) + '%';
  }, []);

  const fitToScreen = useCallback(() => {
    const svg = canvasRef.current?.querySelector('svg');
    const vp = viewportRef.current;
    if (!svg || !vp) return;
    const s = st.current;
    const vw = vp.clientWidth, vh = vp.clientHeight;
    const sw = svg.getBoundingClientRect().width / s.zoom;
    const sh = svg.getBoundingClientRect().height / s.zoom;
    const fit = Math.max(0.15, Math.min(2, Math.min((vw - 80) / sw, (vh - 80) / sh)));
    s.zoom = fit; s.panX = (vw - sw * fit) / 2; s.panY = (vh - sh * fit) / 2;
    apply();
  }, [apply]);

  useEffect(() => {
    const vp = viewportRef.current;
    if (!vp) return;
    const onWheel = (e) => {
      e.preventDefault();
      const r = vp.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top, s = st.current;
      const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      const nz = Math.min(4, Math.max(0.15, s.zoom * f)), sc = nz / s.zoom;
      s.panX = mx - sc * (mx - s.panX); s.panY = my - sc * (my - s.panY); s.zoom = nz;
      apply();
    };
    const onDown = (e) => {
      if (e.target.closest('.node')) return;
      drag.current = { on: true, lx: e.clientX, ly: e.clientY };
      vp.setPointerCapture(e.pointerId);
    };
    const onMove = (e) => {
      const d = drag.current; if (!d.on) return;
      st.current.panX += e.clientX - d.lx; st.current.panY += e.clientY - d.ly;
      d.lx = e.clientX; d.ly = e.clientY; apply();
    };
    const onUp = () => { drag.current.on = false; };
    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('pointerdown', onDown);
    vp.addEventListener('pointermove', onMove);
    vp.addEventListener('pointerup', onUp);
    vp.addEventListener('pointercancel', onUp);
    window.addEventListener('resize', fitToScreen);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('pointerdown', onDown);
      vp.removeEventListener('pointermove', onMove);
      vp.removeEventListener('pointerup', onUp);
      vp.removeEventListener('pointercancel', onUp);
      window.removeEventListener('resize', fitToScreen);
    };
  }, [apply, fitToScreen]);

  const zoomIn = useCallback(() => { st.current.zoom = Math.min(4, st.current.zoom * 1.25); apply(); }, [apply]);
  const zoomOut = useCallback(() => { st.current.zoom = Math.max(0.15, st.current.zoom / 1.25); apply(); }, [apply]);
  return { viewportRef, canvasRef, zoomDisplayRef, zoomIn, zoomOut, fitToScreen };
}

function MermaidDiagram({ onNodeClick }) {
  const ref = useRef(null);
  useEffect(() => {
    window.nodeClickHandler = onNodeClick;
    mermaid.initialize({
      startOnLoad: false, theme: 'dark', securityLevel: 'loose',
      themeVariables: {
        ...MERMAID_THEME,
        secondaryColor: '#000000', tertiaryColor: '#000000',
        mainBkg: '#0a0a0a', nodeBorder: '#2a2a2a',
        clusterBkg: 'rgba(10,10,10,0.8)', clusterBorder: '#7c3aed',
        titleColor: '#ffffff', edgeLabelBackground: 'transparent',
      },
      flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' },
    });
    mermaid.render('walkthrough-diagram', DIAGRAM).then(({ svg, bindFunctions }) => {
      if (ref.current) { ref.current.innerHTML = svg; bindFunctions?.(ref.current); }
    });
    return () => { delete window.nodeClickHandler; };
  }, [onNodeClick]);
  return h('div', { ref, className: 'mermaid-wrap' });
}

function Summary({ collapsed, onToggle }) {
  if (collapsed) {
    return h('div', {
      onClick: onToggle,
      className: 'fixed top-16 left-6 z-10 px-3 py-1.5 bg-wt-surface/60 backdrop-blur border border-wt-border rounded-full shadow-lg cursor-pointer hover:bg-wt-surface/80 transition-all duration-300',
    }, h('span', { className: 'text-xs text-wt-muted font-medium' }, 'ℹ︎ Summary'));
  }
  return h('div', {
    onClick: onToggle,
    className: 'fixed top-16 left-6 z-10 max-w-lg px-4 py-3 bg-wt-surface/80 backdrop-blur border border-wt-border rounded-lg shadow-lg cursor-pointer transition-all duration-300',
  },
    h('p', { className: 'text-sm text-wt-muted leading-relaxed' }, SUMMARY),
    h('p', { className: 'text-[0.65rem] text-wt-muted/50 mt-1.5' }, 'Click to dismiss'),
  );
}

function ZoomControls({ zoomDisplayRef, onZoomIn, onZoomOut, onFit }) {
  const btn = 'w-8 h-8 rounded-md border border-wt-border bg-wt-surface text-wt-muted flex items-center justify-center hover:bg-wt-raised hover:text-wt-fg transition-colors';
  return h('div', { className: 'fixed bottom-5 left-5 z-20 flex items-center gap-2' },
    h('button', { onClick: onZoomOut, className: btn }, '−'),
    h('span', { ref: zoomDisplayRef, className: 'text-xs text-wt-muted w-10 text-center' }, '100%'),
    h('button', { onClick: onZoomIn, className: btn }, '+'),
    h('button', { onClick: onFit, className: btn + ' w-auto px-2 text-xs' }, 'Fit'),
  );
}

function DetailPanel({ nodeId, node, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);
  const codeHtml = HIGHLIGHTED[nodeId];
  return h('div', { className: 'fixed top-4 right-4 bottom-4 w-[560px] z-30 bg-wt-surface border border-wt-border rounded-xl shadow-2xl flex flex-col overflow-hidden' },
    h('button', {
      onClick: onClose,
      className: 'absolute top-3 right-3 z-10 w-7 h-7 rounded-md border border-wt-border bg-wt-raised text-wt-muted flex items-center justify-center text-lg hover:bg-wt-red hover:border-wt-red hover:text-white transition-colors',
    }, '×'),
    h('div', { className: 'flex-1 overflow-y-auto p-5' },
      h('h2', { className: 'text-lg font-bold text-wt-fg mb-3 pr-9' }, node.title),
      h('div', { className: 'dt-body' }, h('p', null, node.description)),
      node.code && h('div', { className: 'dt-body' },
        codeHtml
          ? h('div', { dangerouslySetInnerHTML: { __html: codeHtml } })
          : h('pre', { className: 'code-fallback' }, h('code', null, node.code))
      ),
      node.files?.length > 0 && h('div', { className: 'mt-4 pt-3 border-t border-wt-border' },
        h('div', { className: 'text-[0.7rem] uppercase tracking-wider text-wt-muted font-semibold mb-1.5' }, 'Files'),
        h('code', { className: 'text-sm text-wt-file font-mono leading-relaxed' },
          node.files.map((f, i) => h('span', { key: i }, f, h('br'))))
      ),
    ),
  );
}

function App() {
  const [activeId, _setActiveId] = useState(null);
  const [summaryCollapsed, setSummaryCollapsed] = useState(true);
  const pz = usePanZoom();

  const setActiveNode = useCallback((nodeId) => {
    _setActiveId(nodeId);
    document.querySelectorAll('.mermaid-wrap .node').forEach(n => { n.style.opacity = nodeId ? '0.4' : '1'; });
    if (nodeId) {
      const el = document.querySelector(`.mermaid-wrap .node[id*="${nodeId}"]`);
      if (el) el.style.opacity = '1';
    }
  }, []);
  const closeDetail = useCallback(() => {
    _setActiveId(null);
    document.querySelectorAll('.mermaid-wrap .node').forEach(n => { n.style.opacity = '1'; });
  }, []);
  useEffect(() => { setTimeout(pz.fitToScreen, 600); }, [pz.fitToScreen]);

  return h(React.Fragment, null,
    h('header', { className: 'fixed top-0 inset-x-0 z-10 px-6 py-3.5 bg-gradient-to-b from-wt-bg to-transparent pointer-events-none' },
      h('h1', { className: 'text-base font-semibold text-wt-fg' }, 'world-model-zoo — Project Overview'),
      h('p', { className: 'text-sm text-wt-muted mt-0.5' }, 'The shared foundation: env → data → buffer → algorithms'),
    ),
    h(Summary, { collapsed: summaryCollapsed, onToggle: () => setSummaryCollapsed(c => !c) }),
    h('div', { ref: pz.viewportRef, className: 'w-full h-screen overflow-hidden cursor-grab active:cursor-grabbing' },
      h('div', { ref: pz.canvasRef, className: 'origin-top-left will-change-transform inline-block p-[80px_60px_60px]' },
        h(MermaidDiagram, { onNodeClick: setActiveNode }),
      ),
    ),
    h(ZoomControls, { zoomDisplayRef: pz.zoomDisplayRef, onZoomIn: pz.zoomIn, onZoomOut: pz.zoomOut, onFit: pz.fitToScreen }),
    h('div', { className: 'fixed bottom-5 left-1/2 -translate-x-1/2 z-20 flex gap-4 px-4 py-2 bg-wt-surface border border-wt-border rounded-lg shadow-xl' },
      LEGEND.map(l => h('span', { key: l.label, className: 'flex items-center gap-1.5 text-xs text-wt-muted' },
        h('span', { className: `w-2 h-2 rounded-full ${l.color}` }), l.label)),
    ),
    activeId && NODES[activeId] && h(DetailPanel, { nodeId: activeId, node: NODES[activeId], onClose: closeDetail }),
    h('div', { className: 'fixed bottom-5 right-5 z-20 text-xs text-wt-muted opacity-50' },
      'Scroll zoom · Drag pan · Click nodes'),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
